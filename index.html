<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Turnout Reporter</title>

<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<div class="oic-header">
OIC: <span id="oic-name" class="missing">Not assigned</span>
<br>
Phone: <span id="oic-phone">______</span>
</div>

</header>

<nav class="tabs">

<button>Incident</button>
<button>Connewarre</button>
<button>MTD</button>
<button>Send</button>

</nav>

<main id="content">

<h2>Incident Details</h2>

<label>Pager Date</label>
<input type="date">

<label>Pager Time</label>
<input type="time">

<label>Event ID</label>
<input type="text">

<label>FIRS Code</label>
<input type="text" id="firs-code">

<button onclick="pasteFirs()">Paste</button>

</main>

<script src="app.js"></script>

</body>
