<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Turnout Reporter</title>

<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<div class="oic-header">
OIC: <span id="oic-name" class="missing">Not assigned</span>
<br>
Phone: <span id="oic-phone">______</span>
</div>

</header>

<nav class="tabs">

<button onclick="showTab('incident-tab')">Incident</button>
<button onclick="showTab('connewarre-tab')">Connewarre</button>
<button onclick="showTab('mtd-tab')">MTD</button>
<button onclick="showTab('send-tab')">Send</button>

</nav>

<main>

<section id="incident-tab">

<h2>Incident Details</h2>

<label>Pager Date</label>
<input type="date" id="pager-date">

<label>Pager Time</label>
<input type="time" id="pager-time">

<label>Event ID</label>
<input type="text">

<label>FIRS Code</label>
<input type="text" id="firs-code">

<button onclick="pasteFirs()">Paste</button>

</section>

<section id="connewarre-tab" style="display:none">

<h2>Connewarre Response</h2>

<label>Search member</label>
<input type="text" id="conn-search" placeholder="Type member name..." oninput="searchConnewarreMembers()">

<div id="conn-results"></div>

<h3>Selected Members</h3>
<div id="conn-selected"></div>

<button onclick="showTab('mtd-tab')">Next → MTD Response</button>

</section>

<section id="mtd-tab" style="display:none">

  <h2>MTD Response</h2>

  <label>Brigade</label>
  <select id="mtd-brigade" onchange="clearMTDSearch()">
    <option value="">Select brigade</option>
    <option value="Connewarre">Connewarre</option>
    <option value="Grovedale">Grovedale</option>
    <option value="Freshwater Creek">Freshwater Creek</option>
    <option value="Other">Other</option>
  </select>

  <div id="mtd-other-brigade-wrap" style="display:none;">
    <label>Other Brigade</label>
    <input type="text" id="mtd-other-brigade" placeholder="Enter brigade name">
  </div>

  <label>Search member</label>
  <input type="text" id="mtd-search" placeholder="Type member name..." oninput="searchMTDMembers()">

  <div id="mtd-results"></div>

  <h3>Selected Members</h3>
  <div id="mtd-selected"></div>

  <button onclick="showTab('send-tab')">Next → Send Report</button>

</section>

<section id="send-tab" style="display:none">

  <h2>Send Report</h2>

  <p>Report preview will appear here.</p>

</section>

</main>

<script src="app.js"></script>

</body>
</html>
