<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Turnout Reporter</title>

<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<div class="oic-header">
OIC: <span id="oic-name" class="missing">Not assigned</span>
<br>
Phone: <span id="oic-phone">______</span>
</div>

</header>

<nav class="tabs">

<button onclick="showTab('incident-tab')">Incident</button>
<button onclick="showTab('connewarre-tab')">Connewarre</button>
<button onclick="showTab('mtd-tab')">MTD</button>
<button onclick="showTab('send-tab')">Send</button>

</nav>

<main>

<section id="incident-tab">

<h2>Incident Details</h2>

<label>Pager Date</label>
<input type="date" id="pager-date">

<label>Pager Time</label>
<input type="time" id="pager-time">

<label>Event ID</label>
<input type="text">

<label>FIRS Code</label>
<input type="text" id="firs-code">

<button onclick="pasteFirs()">Paste</button>

</section>

<section id="connewarre-tab" style="display:none">

<h2>Connewarre Response</h2>

<p>No members added yet.</p>

</section>


<section id="mtd-tab" style="display:none">

<h2>MTD Response</h2>

<p>No members added yet.</p>

</section>


<section id="send-tab" style="display:none">

<h2>Send Report</h2>

<p>Report preview will appear here.</p>

</section>

</main>

<script src="app.js"></script>

</body>
</html>
